name: test

# Reusable: convert a few versions once, then run every build under Node 18–26.
on:
  workflow_call:
    inputs:
      versions:
        description: comma-separated versions (accepts "latest"/"stable")
        type: string
        default: "2.1.114,2.1.191,latest"
      platform:
        type: string
        default: linux-x64

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Convert ${{ inputs.versions }} (${{ inputs.platform }})
        run: node test/run.js --convert-only --platform ${{ inputs.platform }} --versions ${{ inputs.versions }}
      - uses: actions/upload-artifact@v4
        with:
          name: cc2node-cache-${{ inputs.platform }}
          path: test/.cache
          retention-days: 1

  matrix:
    needs: convert
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22, 24, 26]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - uses: actions/download-artifact@v4
        with:
          name: cc2node-cache-${{ inputs.platform }}
          path: test/.cache
      - name: Test built outputs on Node ${{ matrix.node }}
        run: node test/run.js --no-convert --this-node --platform ${{ inputs.platform }}
