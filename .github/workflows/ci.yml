name: ci

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'LICENSE', '.gitignore']
  pull_request:
    paths-ignore: ['**.md', 'LICENSE', '.gitignore']
  workflow_dispatch:

jobs:
  checkall:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [18, 20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
      - run: npm run checkall
